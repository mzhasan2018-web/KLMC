@if (bookingService.isOpen()) {
  <div class="modal-backdrop" (click)="close()"></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <button class="modal-close" type="button" (click)="close()" aria-label="Close">&times;</button>

    @if (!submitted) {
      <h2>Book a Free Consultation</h2>
      <p class="modal-subtitle">
        Leave your details and we&rsquo;ll be in touch to arrange your free telephone consultation.
      </p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="modal-form">
        <label>
          Full Name
          <input type="text" formControlName="fullName" />
        </label>

        <label>
          Email
          <input type="email" formControlName="email" />
        </label>

        <label>
          Phone
          <input type="tel" formControlName="phone" />
        </label>

        <label>
          Preferred Clinic
          <select formControlName="preferredClinic">
            <option value="klmc-tralee">KLMC &mdash; Tralee / Online</option>
            <option value="ivy-listowel">Ivy Clinic &mdash; Listowel</option>
          </select>
        </label>

        <label>
          Message (optional)
          <textarea rows="3" formControlName="message"></textarea>
        </label>

        <button type="submit" class="btn-klmc" [disabled]="submitting">
          {{ submitting ? 'Sending...' : 'Request Consultation' }}
        </button>
      </form>
    } @else {
      <h2>Thank you</h2>
      <p>Your consultation request has been received. We&rsquo;ll be in touch shortly to confirm a time.</p>
      <button class="btn-klmc secondary" type="button" (click)="close()">Close</button>
    }
  </div>
}
