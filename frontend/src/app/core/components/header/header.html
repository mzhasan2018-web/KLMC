<header class="klmc-header">
  <div class="header-inner">
    <a routerLink="/" class="logo-wrap">
      <div class="logo-box">KLMC</div>
    </a>

    <nav class="main-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/about" routerLinkActive="active">About</a>
      <a routerLink="/clinics-bookings" routerLinkActive="active">Clinics &amp; Bookings</a>
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>

    <div class="header-actions">
      <button class="book-btn" type="button" (click)="bookingService.open()">Book Appointment</button>
    </div>
  </div>
</header>
